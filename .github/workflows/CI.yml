name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Opt JavaScript-based actions into Node 24 ahead of the June 2026 default
  # switch (see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Pack
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore src/Blitter.sln

      - name: Build
        run: dotnet build src/Blitter.sln -c Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path src,tests -Recurse -Filter *.csproj -ErrorAction SilentlyContinue |
            Where-Object { Select-String -Path $_.FullName -Pattern '<IsTestProject>\s*true\s*</IsTestProject>|Microsoft\.NET\.Test\.Sdk' -Quiet }
          if ($testProjects.Count -eq 0) {
            Write-Error "No test projects found."
            exit 1
          }
          foreach ($p in $testProjects) {
            Write-Host "Running tests for $($p.FullName)"
            # Exclude GPU/allocation-sensitive tests: they require a real
            # graphics driver and are timing/JIT-sensitive, so they're
            # intended for local development runs, not headless CI.
            dotnet test $p.FullName -c Release --no-build --verbosity normal --filter "Category!=Gpu"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Pack
        run: dotnet pack src/Blitter.Package/Blitter.Package.csproj -c Release --no-build -o artifacts/nuget

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.*nupkg
          if-no-files-found: error
