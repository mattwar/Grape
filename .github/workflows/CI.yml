name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Pack
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore src/Grape.sln

      - name: Build
        run: dotnet build src/Grape.sln -c Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path src -Recurse -Filter *.csproj |
            Where-Object { Select-String -Path $_.FullName -Pattern '<IsTestProject>\s*true\s*</IsTestProject>|Microsoft\.NET\.Test\.Sdk' -Quiet }
          if ($testProjects.Count -eq 0) {
            Write-Host "No test projects found; skipping tests."
          } else {
            foreach ($p in $testProjects) {
              Write-Host "Running tests for $($p.FullName)"
              dotnet test $p.FullName -c Release --no-build --verbosity normal
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }

      - name: Pack
        run: dotnet pack src/Grape.Graphics/Grape.Graphics.csproj -c Release --no-build -o artifacts/nuget

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.*nupkg
          if-no-files-found: error
